<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoveMate</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <span class="eyebrow">MoveMate MVP</span>
        <h1>MoveMate Autofill</h1>
        <p class="helper">Save your move details, then fill common address and contact forms on the current page.</p>
      </header>

      <form id="profileForm" class="form">
        <label>
          Full name
          <input id="fullName" name="fullName" autocomplete="name" />
        </label>
        <label>
          Email
          <input id="email" name="email" type="email" autocomplete="email" />
        </label>
        <label>
          Phone
          <input id="phone" name="phone" autocomplete="tel" />
        </label>
        <label>
          Street address
          <input id="street" name="street" autocomplete="street-address" />
        </label>
        <div class="grid">
          <label>
            City
            <input id="city" name="city" autocomplete="address-level2" />
          </label>
          <label>
            State
            <input id="state" name="state" autocomplete="address-level1" />
          </label>
        </div>
        <div class="grid">
          <label>
            Zip
            <input id="zip" name="zip" autocomplete="postal-code" />
          </label>
          <label>
            Country
            <input id="country" name="country" autocomplete="country-name" />
          </label>
        </div>
      </form>

      <button id="fillPage" class="primary" type="button">Fill Current Page</button>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
